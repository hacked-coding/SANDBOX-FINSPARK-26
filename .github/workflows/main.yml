name: Run AI Prototype

# This tells GitHub to run the code every time you push changes or manually trigger it
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually click a "Run" button

jobs:
  run-code:
    runs-on: ubuntu-latest

    steps:
    # 1. Download the code from your repository into the virtual runner
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 2. Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install the libraries listed in your requirements.txt
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Execute the Python script
    - name: Execute AI Prototype Script
      run: python app.py
